version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shizenai
    ports:
      - "5432:5432"
    volumes:
      - shizen_pg_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - shizen_ollama_models:/root/.ollama

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/shizenai
      - AI_PROVIDER=local
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    depends_on:
      - postgres
      - ollama
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  shizen_pg_data:
    external: true
  shizen_ollama_models:
    external: true
